<!DOCTYPE html>
<html>
<head>
    <title>Seat Selection</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h2>CinemaWorld</h2>
</header>

<section class="section">
    <div class="screen">SCREEN THIS SIDE</div>

    <div class="seat-grid">
        <div class="seat">A1</div>
        <div class="seat">A2</div>
        <div class="seat booked">A3</div>
        <div class="seat">A4</div>
        <div class="seat">A5</div>

        <div class="seat">B1</div>
        <div class="seat">B2</div>
        <div class="seat">B3</div>
        <div class="seat booked">B4</div>
        <div class="seat">B5</div>

        <div class="seat">C1</div>
        <div class="seat">C2</div>
        <div class="seat">C3</div>
        <div class="seat">C4</div>
        <div class="seat">C5</div>

        <div class="seat">D1</div>
        <div class="seat">D2</div>
        <div class="seat">D3</div>
        <div class="seat">D4</div>
        <div class="seat">D5</div>
    </div>

    <div class="legend">
        <p>Green: Available | Red: Booked</p>
    </div>

    <button class="primary" onclick="location.href='summary.html'">Proceed to Summary</button>
</section>

<footer>
    © 2025 CinemaWorld
</footer>

</body>
</html>
