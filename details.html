<!DOCTYPE html>
<html>
<head>
<title>Movie Details</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<h2>CinemaWorld</h2>

<nav>
<a href="index.html">Home</a>
<a href="movies.html">Movies</a>
</nav>

</header>

<section class="section details-container">

<img id="moviePoster">

<div>

<h2 id="movieTitle"></h2>

<p>Genre: Action / Sci-Fi</p>
<p>Duration: 2h 20m</p>

<h3>Select Show Time</h3>

<div class="time">10:00 AM</div>
<div class="time">1:00 PM</div>
<div class="time">6:00 PM</div>
<div class="time">9:00 PM</div>

<br><br>

<a href="seats.html" class="primary">Select Seats</a>

</div>

</section>

<footer>
© 2025 CinemaWorld
</footer>

<script>

const params = new URLSearchParams(window.location.search);
const movie = params.get("movie");

const poster = document.getElementById("moviePoster");
const title = document.getElementById("movieTitle");

title.textContent = movie;

poster.src = "images/" + movie + ".jpeg";

</script>

<script src="js/script.js"></script>

</body>
</html>
