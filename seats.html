<!DOCTYPE html>
<html>
<head>
    <title>Seat Selection</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h2>CinemaWorld</h2>
    <nav>
        <a href="index.html">Home</a>
        <button id="themeToggle">Theme</button>
    </nav>
</header>

<section class="section">

    <h2>Selected Time: <span id="showTimeDisplay"></span></h2>

    <div class="screen">SCREEN THIS SIDE</div>

    <div class="seat-grid">
        <!-- 80 seats -->
        <!-- Just replicate visually -->
        <!-- Row A -->
        <div class="seat"></div><div class="seat"></div><div class="seat booked"></div>
        <div class="seat"></div><div class="seat"></div><div class="seat"></div>
        <div class="seat"></div><div class="seat"></div><div class="seat"></div>
        <div class="seat"></div>

        <!-- Row B -->
        <div class="seat"></div><div class="seat"></div><div class="seat"></div>
        <div class="seat"></div><div class="seat booked"></div><div class="seat"></div>
        <div class="seat"></div><div class="seat"></div><div class="seat"></div>
        <div class="seat"></div>

        <!-- Row C -->
        <div class="seat"></div><div class="seat"></div><div class="seat"></div>
        <div class="seat"></div><div class="seat"></div><div class="seat"></div>
        <div class="seat"></div><div class="seat booked"></div><div class="seat"></div>
        <div class="seat"></div>
    </div>

    <p>Total: ₹<span id="total">0</span></p>

    <a href="summary.html" class="primary">Proceed to Summary</a>

</section>

<footer>
    © 2025 CinemaWorld
</footer>

<script src="js/script.js"></script>
<script>
document.getElementById("showTimeDisplay").textContent =
    localStorage.getItem("showTime");
</script>
</body>
</html>
